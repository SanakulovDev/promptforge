services:
  promptforge:
    build: .
    ports:
      - "4174:4174"
    environment:
      NODE_ENV: production
      PORT: 4174
      # Provider keys (optional). With GEMINI_API_KEY set, the engine uses Gemini;
      # otherwise ANTHROPIC_API_KEY; otherwise the offline heuristic.
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
